name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: clipboard-manager-windows-amd64.exe
            ldflags: "-s -w -H windowsgui"

          - os: macos-13
            goos: darwin
            goarch: amd64
            binary: clipboard-manager-darwin-amd64
            ldflags: "-s -w"

          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: clipboard-manager-darwin-arm64
            ldflags: "-s -w"

          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: clipboard-manager-linux-amd64
            ldflags: "-s -w"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      # Windows: MSYS2 経由で MinGW GCC を用意 (Fyne の CGO ビルドに必要)
      - name: Set up MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          path-type: inherit

      # Linux: X11 / OpenGL 開発ヘッダを追加 (Fyne の依存)
      - name: Install X11/OpenGL dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libxxf86vm-dev \
            libgl1-mesa-dev

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "${{ matrix.ldflags }}" -o "${{ matrix.binary }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
